services:
  backend:
    build:
      context: ./backend
    container_name: effective-mobile-backend
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:1.30.2-alpine
    container_name: effective-mobile-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge